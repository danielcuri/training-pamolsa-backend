version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: nest_postgres_db
    restart: always
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: nestuser
      POSTGRES_PASSWORD: nestpassword
      POSTGRES_DB: training_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
